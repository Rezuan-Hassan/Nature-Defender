<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rezuan's Nature Defender</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; text-align: center; touch-action: none; }
        canvas { display: block; margin: 0 auto; max-width: 100%; height: auto; border: 2px solid #555; }
        #ui { padding: 10px; font-size: 18px; }
        #ult-btn { 
            position: fixed; bottom: 20px; right: 20px; 
            width: 70px; height: 70px; border-radius: 50%; 
            background: rgba(0, 242, 255, 0.3); border: 2px solid #00f2ff;
            color: white; font-weight: bold; display: flex; 
            align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div id="ult-btn">ULT</div>
    <script src="script.js"></script>
</body>
</html>
